name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  standards-gate:
    name: Standards Conformance Gate (AINDGS / LFLRS / PPLAS)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history for the AI-provenance commit walk
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: AINDGS-R1 — CLAUDE.md required sections
        run: npm run check:claude-md

      - name: LFLRS-R2 — schema self-validity + sample fixture
        run: npm run check:lflrs-schema

      - name: PPLAS-R5 — every track() event matches the catalog
        run: npm run check:analytics-catalog

      - name: AINDGS-R3 — AI provenance tags on high-risk-path commits
        run: npm run check:ai-provenance

      - name: LFLRS / xAPI — Vitest learner-record suite
        run: npx vitest run tests/learner-record
