# AINDGS-1.0 Capabilities Manifest — DURA
#
# Machine-readable mirror of the "Capability Boundary" and "High-Risk Surfaces"
# sections of /CLAUDE.md. The narrative form in CLAUDE.md is the source of truth
# for humans; this file is the source of truth for tooling (CI provenance gate,
# capability-violation detector, audit scripts).
#
# When CLAUDE.md and this file diverge, CLAUDE.md wins for human review and this
# file must be updated to match (within the same commit). The CI gate detects
# divergence by hash-comparing the relevant CLAUDE.md sections to the values
# below — see scripts/check-claude-md-sections.js (Phase 4).

standard: AINDGS-1.0
project: DURA
project_owner: Durwood Studios LLC
manifest_version: 1.0
last_updated: 2026-04-25

agents:
  - id: claude-code
    role: implementation + governance authoring
    provenance_tag: "[AI: claude-code ~X%]"
    permitted_paths:
      - "src/components/**"
      - "src/hooks/**"
      - "src/lib/**"          # excluding high-risk paths below
      - "src/app/**"          # excluding (auth) and (payment) routes
      - "tests/**"
      - "xDocs/**"
      - "standards/**"
    permitted_operations:
      - read_any_file
      - write_permitted_paths
      - run_npm_scripts
      - run_git_read_commands  # status, diff, log, ls-files
      - run_vitest
    prohibited_operations:
      - modify_secrets             # .env, .env.local, any *.secret, *.key
      - modify_claude_md_without_human_instruction
      - commit_to_main             # always work in a short-lived branch on shared hosts
      - modify_codeowners
      - modify_supabase_migrations_without_per_change_instruction
      - apply_changes_to_live_supabase  # ADR 0001 — defer to staged/supabase/

high_risk_surfaces:
  - path: "src/lib/auth/**"
    reason: authentication; session handling
    review_required: true
  - path: "src/lib/crypto.ts"
    reason: cryptography
    review_required: true
  - path: "src/lib/idb/encryption.ts"
    reason: at-rest encryption (created in Phase 5-A)
    review_required: true
  - path: "src/lib/supabase/queries/analytics.ts"
    reason: PII-adjacent telemetry
    review_required: true
  - path: "src/lib/supabase/sync.ts"
    reason: cross-device data integrity
    review_required: true
  - path: "supabase/migrations/**"
    reason: schema changes; data migration
    review_required: true
  - path: "src/lib/payments/**"
    reason: payment handling (does not yet exist)
    review_required: true
  - path: "next.config.ts"
    reason: CSP and security headers
    review_required: true
  - path: "CLAUDE.md"
    reason: governance contract itself
    review_required: true
  - path: "CODEOWNERS"
    reason: governance contract itself
    review_required: true
  - path: "standards/**"
    reason: machine-enforceable conformance contract
    review_required: true

review_triggers:
  high_risk_surface_change:
    output_required: "⚠️ HIGH-RISK SURFACE CHANGE: <path> — Human review required before merge."
  migration_commit:
    output_required: "Plain-English description of what the migration does and what data it touches."
  dependency_change:
    output_required: "Summary of added/removed/upgraded packages; wait for confirmation before pushing."
    exempt: "lockfile-only changes from `npm install` after an approved package.json edit"

provenance:
  format: "[AI: <agent> ~X%] <conventional-commit-subject> (<optional-standard-or-law>)"
  rationale_doc: "xDocs/decisions/0002-ai-provenance-format.md"
  enforcement_phase: "Phase 4 — CI standards-gate"
  enforcement_script: "scripts/check-ai-provenance.js"  # to be created in Phase 4
  scope: "all commits touching CODEOWNERS-protected paths"

related:
  ci_workflow: ".github/workflows/ci.yml"
  decision_records:
    - "xDocs/decisions/0001-supabase-deferral-pattern.md"
    - "xDocs/decisions/0002-ai-provenance-format.md"
  changelog: "/CLAUDE.md#changelog"
