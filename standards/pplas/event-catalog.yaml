# PPLAS-1.0 Event Catalog — DURA
#
# Two-tier catalog (decision recorded inline; the build prompt envisioned a
# greenfield 4-event design but DURA already ships 18 raw events through
# src/lib/analytics.ts that are consent-gated and locally queued, so this
# file documents both layers explicitly):
#
#   Tier 1 — RAW events
#     What track() writes to IDB. Consent-gated at write time
#     (isAnalyticsEnabled()). Stored locally in the `analytics` IDB store.
#     Transmitted to Supabase only when the consent gate is on AND a sync
#     run picks them up. PII is per-event below.
#
#   Tier 2 — AGGREGATE signals
#     Derived from raw events by src/lib/analytics/aggregation.ts. Aggregates
#     are computed locally, have differential-privacy noise applied at the
#     specified epsilon, and are the ONLY shape used for cross-learner
#     analytics views. The aggregation step strips per-event identifiers
#     and timestamps; only bucketed counts, rates, and means survive.
#
# Per PPLAS-R5: no analytics event may be added to the codebase that is not
# in this catalog. The CI gate (Phase 4 / scripts/check-analytics-catalog.js)
# enforces this — `track("foo")` calls in source must match a `raw_events.id`
# below, and aggregator outputs must match an `aggregate_signals.id`.

standard: PPLAS-1.0
project: DURA
catalog_version: 1.0
last_updated: 2026-04-25

# ─── Tier 1: raw events ─────────────────────────────────────────────────────

raw_events:
  - id: lesson_started
    description: User opens a lesson page (lesson_id, phase_id, module_id captured).
    fields:
      lessonId:  { type: string, pii: false }
      phaseId:   { type: string, pii: false }
      moduleId:  { type: string, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Powers cross-device progress sync and the dashboard "where you left off" hint.

  - id: lesson_completed
    description: Completion gate satisfied (scroll + time + quiz).
    fields:
      lessonId:    { type: string, pii: false }
      phaseId:     { type: string, pii: false }
      moduleId:    { type: string, pii: false }
      xp:          { type: number, pii: false }
      timeSpentMs: { type: number, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Unlocks the next lesson; feeds streak and XP awards.

  - id: quiz_attempted
    description: User submits a quiz answer set.
    fields:
      lessonId: { type: string, pii: false }
      score:    { type: number, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Drives content-difficulty signal aggregation.

  - id: quiz_passed
    description: Quiz reached the passing threshold.
    fields:
      lessonId: { type: string, pii: false }
      score:    { type: number, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Marks the quiz check on the completion gate.

  - id: flashcard_rated
    description: User rates a card during a review session.
    fields:
      cardId: { type: string, pii: false }
      rating: { type: string, pii: false }   # again | hard | good | easy
      state:  { type: string, pii: false }   # FSRS state
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Required for FSRS scheduling and the daily review aggregate.

  - id: flashcard_session_completed
    description: User finishes a review queue.
    fields:
      cardCount: { type: number, pii: false }
      durationMs: { type: number, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Powers session-duration aggregate.

  - id: dictionary_searched
    description: User searches the dictionary.
    fields:
      query: { type: string, pii: false }   # not pii — short, vocab-bounded; never free-form personal text
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Surface what learners look up; improves dictionary coverage.

  - id: dictionary_term_viewed
    description: User opens a dictionary term page.
    fields:
      termSlug: { type: string, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Feeds "popular terms this week" signal.

  - id: sandbox_executed
    description: User runs code in a sandbox.
    fields:
      lessonId: { type: string, pii: false }
      language: { type: string, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Drives sandbox usage metrics; the source code typed by the learner is NEVER captured.

  - id: streak_extended
    description: User extended their daily-study streak.
    fields:
      days: { type: number, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Streak gamification.

  - id: phase_unlocked
    description: User unlocked a phase.
    fields:
      phaseId: { type: string, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Mastery-progression analytics.

  - id: verification_started
    description: User started a verification (mastery test).
    fields:
      targetId: { type: string, pii: false }
      type:     { type: string, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Verification funnel analysis.

  - id: verification_passed
    description: User passed a verification.
    fields:
      targetId: { type: string, pii: false }
      score:    { type: number, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Certificate issuance.

  - id: goal_set
    description: User set a study goal.
    fields:
      type:   { type: string, pii: false }
      target: { type: number, pii: false }
      unit:   { type: string, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Goal progress UI.

  - id: goal_achieved
    description: User achieved a study goal.
    fields:
      goalId: { type: string, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Goal completion celebrations.

  - id: study_mode_changed
    description: User switched study mode (standard/bite/focus/review/sprint/challenge).
    fields:
      mode: { type: string, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Preference analysis to inform UX defaults.

  - id: theme_changed
    description: User toggled theme.
    fields:
      theme: { type: string, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Theme preference analysis.

  - id: share_clicked
    description: User clicked a share button.
    fields:
      target: { type: string, pii: false }
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Share funnel analysis.

# ─── Tier 2: aggregate signals (DP-noised, derived from raw events) ─────────

aggregate_signals:
  - id: card_review_daily_aggregate
    description: Daily count and mean rating per learner. Derived from flashcard_rated.
    derived_from: [flashcard_rated]
    fields:
      review_count: { type: number, pii: false, dp_sensitivity: 10 }
      avg_rating:   { type: number, pii: false, dp_sensitivity: 1 }
    dp_epsilon: 1.0
    transmitted_remotely: false   # local-only signal (drives the dashboard ring chart)
    consent_required: false       # never leaves the device
    learner_benefit: Fuels the local dashboard "today's reviews" chart without ever transmitting raw event timestamps.

  - id: mastery_transition
    description: Module mastery achieved. Derived from moduleProgress changes.
    derived_from: [moduleProgress]   # not a raw analytics event; derived from IDB state
    fields:
      moduleId:    { type: string, pii: false }
      masteryScore: { type: number, pii: false, dp_sensitivity: 0 }
      timestamp:   { type: number, pii: false, dp_sensitivity: 0 }
    dp_epsilon: null               # discrete event, no noise applied
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Cross-device mastery sync; fuels "modules unlocked this week" leaderboards (when implemented).

  - id: session_duration_aggregate
    description: Daily total study minutes per learner. Derived from lesson_started + lesson_completed pairs.
    derived_from: [lesson_started, lesson_completed]
    fields:
      total_minutes: { type: number, pii: false, dp_sensitivity: 60 }
    dp_epsilon: 1.0
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Aggregate study-time metrics for cross-learner views; raw lesson timestamps never transmitted.

  - id: content_difficulty_signal
    description: Aggregate lapse rate per card type / lesson. Derived from flashcard_rated.
    derived_from: [flashcard_rated]
    fields:
      lessonId:    { type: string, pii: false }
      lapse_rate:  { type: number, pii: false, dp_sensitivity: 1 }
      sample_size: { type: number, pii: false, dp_sensitivity: 5 }
    dp_epsilon: 1.0
    transmitted_remotely: true
    consent_required: true
    learner_benefit: Identifies content the FSRS scheduler keeps re-presenting; informs curriculum revision.

# ─── References ─────────────────────────────────────────────────────────────

related:
  consent_gate: src/lib/analytics/consent-gate.ts       # PPLAS-R4 / GDPR Art. 7
  raw_event_track_fn: src/lib/analytics.ts
  aggregation_module: src/lib/analytics/aggregation.ts  # PPLAS-R3 (this commit)
  ci_enforcement_script: scripts/check-analytics-catalog.js  # to be created in Phase 4
